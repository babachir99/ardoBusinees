name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jontaado_ci?schema=public
      NEXTAUTH_SECRET: ci-nextauth-secret-only-for-tests
      NEXTAUTH_URL: http://127.0.0.1:3010
      PUBLIC_APP_ORIGIN: http://127.0.0.1:3010
      INTERNAL_BASE_URL: http://127.0.0.1:3010
      ALLOWED_HOSTS: localhost,127.0.0.1
      INTERNAL_API_TOKEN: ci-internal-token
      ALLOW_INSECURE_INTERNAL_CALLS: "0"
      AUTH_DEBUG_TOKENS: "0"
      CSP_MODE: report-only
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jontaado_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jontaado_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: |
          npm run seed
          npm run qa:seed-auth-fixtures

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Staging env sanity check
        run: npm run qa:env:staging

      - name: QA auth
        run: npm run qa:auth

      - name: QA KYC
        run: npm run qa:kyc

      - name: QA forms prefill
        run: npm run qa:forms-prefill

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          npm start -- --hostname 127.0.0.1 --port 3010 > ci-server.log 2>&1 &
          echo $! > ci-server.pid

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3010/api/profile || true)
            if [ "$code" = "200" ] || [ "$code" = "401" ]; then
              exit 0
            fi
            sleep 2
          done
          cat ci-server.log
          exit 1

      - name: Smoke readonly
        run: npm run qa:smoke:readonly -- --base-url=http://127.0.0.1:3010

      - name: Cleanup
        if: always()
        run: |
          if [ -f ci-server.pid ]; then
            kill "$(cat ci-server.pid)" || true
          fi
          cat ci-server.log || true
